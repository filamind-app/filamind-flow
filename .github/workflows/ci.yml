name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm test
      # Every non-en locale must carry exactly the en key set (no missing / no extra). Trivial
      # while only en exists; becomes a real gate as translations land.
      - run: npm run i18n:keydiff
      - run: npm run build
      # The printer host serves the pre-built bundle straight from git (no Node on the
      # Pi), so a stale committed dist silently ships an old UI. Fail if a fresh build
      # changes anything under frontend/dist that wasn't committed.
      - name: Verify committed frontend/dist is fresh
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "::error::frontend/dist is stale — run 'npm run build' and commit the result."
            git status --porcelain -- dist
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest
