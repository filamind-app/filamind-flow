# Add this section to ~/printer_data/config/moonraker.conf (or an included file)
# so Moonraker's update manager keeps FilaMind Flow updated and shows it in the UI.
[update_manager filamind-flow]
type: git_repo
path: ~/filamind-flow
origin: https://github.com/filamind-app/filamind-flow.git
primary_branch: main
managed_services: filamind-flow
# Runs after each update to rebuild the frontend + refresh backend deps:
install_script: deploy/install.sh
