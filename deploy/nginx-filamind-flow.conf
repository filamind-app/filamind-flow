# FilaMind Flow — nginx site that serves the built SPA and routes API traffic
# same-origin (so the browser needs no CORS). Copy to
# /etc/nginx/sites-available/filamind-flow, symlink into sites-enabled, edit the
# root path, then: sudo nginx -t && sudo systemctl reload nginx
#
# In this (reverse-proxy) mode set the frontend env to this origin, e.g.:
#   VITE_MOONRAKER_HTTP_URL=http://printer.local:8080
#   VITE_MOONRAKER_WS_URL=ws://printer.local:8080/websocket
#   VITE_BACKEND_URL=http://printer.local:8080

server {
    listen 8080;
    server_name _;

    # Built frontend (npm run build -> frontend/dist)
    root /home/pi/filamind-flow/frontend/dist;
    index index.html;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FilaMind Flow backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Moonraker REST
    location ~ ^/(server|printer|access|machine) {
        proxy_pass http://127.0.0.1:7125;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Moonraker WebSocket
    location /websocket {
        proxy_pass http://127.0.0.1:7125;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
