# FilaMind Flow — nginx site that serves the built SPA and routes API traffic
# same-origin (no CORS), so the panel works at whatever host/IP you reach it by —
# nothing is baked in. Copy to /etc/nginx/sites-available/filamind-flow, symlink
# into sites-enabled, set `root` to your install path, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Serve the default pre-built frontend as-is: it resolves Moonraker, the websocket
# and the backend from window.location (same origin). Do NOT set any VITE_*
# override — that would hardcode a host and break access via other IPs/hostnames.

server {
    listen 8090;
    server_name _;

    # Built frontend (npm run build -> frontend/dist)
    root /home/pi/filamind-flow/frontend/dist;
    index index.html;

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html references the hashed bundles, so it must never be served
    # stale — always revalidate so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FilaMind Flow backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Resonance captures move the toolhead for minutes (a belt comparison is two
        # full sweeps; a vibrations profile is longer). nginx's default 60s read
        # timeout would 504 long before the backend replies — give it generous room.
        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
    }

    # Moonraker REST. Origin is stripped so Moonraker treats the same-origin
    # proxied request as a trusted client (no cors_domains entry needed).
    location ~ ^/(server|printer|access|machine) {
        proxy_pass http://127.0.0.1:7125;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin "";
    }

    # Moonraker WebSocket
    location /websocket {
        proxy_pass http://127.0.0.1:7125;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin "";
        proxy_read_timeout 86400;
    }
}
