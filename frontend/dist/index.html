<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>FilaMind Flow</title>
    <!--
      No-flash theme: apply the stored (or default 'light') theme to <html> BEFORE any CSS/JS loads,
      so the page never flashes a non-default theme before the runtime (src/core/theme.ts) hydrates.
      Keep the key/default in sync with theme.ts (STORAGE_KEY 'filamind-theme', DEFAULT 'light').
    -->
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem('filamind-theme') || 'light'
      } catch (e) {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
    <!--
      Fonts load from Google with system fallbacks so the panel still renders on
      an offline printer host. For fully offline installs, self-host these (see
      docs/ARCHITECTURE.md).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Arabic faces (loaded only when the Arabic UI is used; scoped via :lang(ar) in main.css).
      Same Google-Fonts-with-system-fallback model as above; self-hosting for fully offline hosts
      is tracked in ROADMAP.md.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=Noto+Sans+Arabic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="./assets/index-KAkLJJT1.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Db7PZMHS.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
